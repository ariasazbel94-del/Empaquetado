<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Bundler v5.6 — Pure Fusion</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff4d4d; --bg: #050508; --surface: #0e0e12; --logic: #bb86fc; --green: #2effa8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: #f0f0f0; font-family: 'Syne', sans-serif; 
            margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh;
        }

        h1 { font-size: 1.5rem; letter-spacing: -1px; margin: 0 0 15px 0; color: var(--accent); text-align: center; }

        .grid { display: flex; flex-direction: column; gap: 10px; flex: 1; min-height: 0; }
        @media (min-width: 768px) { .grid { flex-direction: row; } }

        .editor-box { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .label { font-size: 10px; color: var(--logic); margin-bottom: 4px; font-weight: bold; }

        textarea { 
            flex: 1; background: var(--surface); border: 1px solid #1e1e26; 
            color: var(--green); font-family: 'JetBrains Mono', monospace; padding: 12px; 
            border-radius: 8px; font-size: 13px; resize: none; outline: none;
        }

        .btn-main { 
            width: 100%; padding: 18px; margin-top: 15px; background: var(--accent); 
            color: #fff; border: none; border-radius: 12px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; font-family: 'Syne';
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3);
        }

        .status-msg { font-size: 10px; color: #555; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>

    <h1>📦 SMART BUNDLER <span style="color:#fff">v5.6</span></h1>
    
    <div class="grid">
        <div class="editor-box">
            <div class="label">INTERFAZ HTML (UI)</div>
            <textarea id="in-html" placeholder="Pega el código de la interfaz..."></textarea>
        </div>
        <div class="editor-box">
            <div class="label">LÓGICA PYTHON (SENTINEL)</div>
            <textarea id="in-py" placeholder="Pega el código Python..."></textarea>
        </div>
    </div>

    <button class="btn-main" onclick="generateApp()">Fusionar y Descargar HTML</button>
    <div class="status-msg">Genera un archivo único con PyScript integrado.</div>

<script>
    function generateApp() {
        const html = document.getElementById('in-html').value || "<html><body><h1 style='color:white'>App Lista</h1></body></html>";
        const py = document.getElementById('in-py').value;
        const cTag = "<" + "/script>";

        // --- INYECCIÓN DE RECURSOS BÁSICOS ---
        const headTags = `
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
        <style>
            body { background: #050508; color: white; margin: 0; }
        </style>
        <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js">${cTag}`;

        const pyCode = '<script type="py">' + py + cTag;

        // Ensamblaje Final
        let doc = html;
        // Inyectamos el runtime en el head
        if (doc.includes("</head>")) {
            doc = doc.replace("</head>", headTags + "</head>");
        } else {
            doc = headTags + doc;
        }
        
        // Inyectamos el código Python al final del body
        if (doc.includes("</body>")) {
            doc = doc.replace("</body>", pyCode + "</body>");
        } else {
            doc = doc + pyCode;
        }

        // Descarga
        const blob = new Blob([doc], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "PyApp_Fusion_" + Date.now() + ".html";
        a.click();
    }
</script>
</body>
</html>
