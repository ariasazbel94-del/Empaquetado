<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PyFactory — PWA Smart Bundler v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #050508; --surface: #0e0e12; --logic: #bb86fc; }
        body { background: var(--bg); color: #f0f0f0; font-family: 'Syne', sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        textarea { width: 100%; height: 300px; background: var(--surface); border: 1px solid #1e1e26; color: #2effa8; font-family: 'JetBrains Mono'; padding: 15px; border-radius: 8px; box-sizing: border-box; }
        .btn-pwa { width: 100%; padding: 20px; margin-top: 20px; background: var(--logic); color: #000; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-family: 'Syne'; font-size: 16px; box-shadow: 0 0 20px rgba(187, 134, 252, 0.2); }
        .btn-pwa:hover { background: var(--accent); box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }
        .info { margin-top: 15px; font-size: 11px; color: #666; text-align: center; }
    </style>
</head>
<body>

    <h1 style="letter-spacing:-2px">📦 SMART BUNDLER <span style="color:var(--logic)">PWA EDITION</span></h1>

    <div class="grid">
        <textarea id="in-html" placeholder="Pega tu Interfaz HTML..."></textarea>
        <textarea id="in-py" placeholder="Pega tu Lógica Python..."></textarea>
    </div>

    <button class="btn-pwa" onclick="generatePWA()">Generar Lector de App Independiente (.html)</button>
    <div class="info">El archivo resultante se podrá instalar como una App nativa en tu PC o Celular.</div>

<script>
    function generatePWA() {
        const html = document.getElementById('in-html').value || "<html><body><h1>Mi App</h1></body></html>";
        const py = document.getElementById('in-py').value;
        const cTag = "<" + "/script>";
        
        // 1. Configuración de App Independiente (Manifest)
        // Usamos un Data URI para el manifest para que todo viva en un solo archivo
        const manifest = {
            "name": "PyFactory App",
            "short_name": "PyApp",
            "display": "standalone",
            "start_url": ".",
            "background_color": "#050508",
            "theme_color": "#00f2ff"
        };
        const manifestStr = encodeURIComponent(JSON.stringify(manifest));
        const manifestTag = `<link rel="manifest" href="data:application/manifest+json,${manifestStr}">`;

        // 2. Bloqueo de UI de Navegador (CSS para sentirlo como App)
        const appStyle = `
        <style>
            body { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; overflow: hidden; }
            /* Evita el scroll elástico en móviles */
            html, body { position: fixed; overflow: hidden; width: 100%; height: 100%; }
        </style>`;

        // 3. Runtime de PyScript
        const runtime = `
        <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
        <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js">${cTag}`;

        // 4. Lógica Python
        const scriptPy = `\n<script type="py">\n${py}\n${cTag}\n`;

        // Fusión Final
        let doc = html;
        if (doc.includes("</head>")) {
            doc = doc.replace("</head>", manifestTag + appStyle + runtime + "</head>");
        } else {
            doc = manifestTag + appStyle + runtime + doc;
        }
        
        if (doc.includes("</body>")) {
            doc = doc.replace("</body>", scriptPy + "</body>");
        } else {
            doc = doc + scriptPy;
        }

        // Descarga
        const blob = new Blob([doc], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "PyFactory_Standalone_App.html";
        a.click();
    }
</script>
</body>
</html>
